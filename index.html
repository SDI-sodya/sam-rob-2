<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СР№2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Генеологічне дерево</h1>
        <p class="subtitle">Конвертер .gtr ↔ .xml</p>

        <div class="card">
            <input type="file" id="fileInput" accept=".gtr,.xml" hidden>
            <button onclick="document.getElementById('fileInput').click()">Вибрати файл</button>
            <span id="fileName">Файл не вибрано</span>
            <button onclick="processFile()">Обробити файл</button>
            <button onclick="clearOutput()" class="button2">Очистити</button>

        </div>

        <div class="output-wp">
            <h2>Результат</h2>
            <pre id="output">Очікування файлу...</pre>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
