<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СР№2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Генеологічне дерево</h1>
        <p class="subtitle">Конвертер .gtr ↔ .xml</p>

        <div class="card">
            <input type="file" id="fileInput" accept=".gtr,.xml">
            <button onclick="processFile()">Обробити файл</button>
            <button onclick="clearOutput()" style="background: #dc2626; color: white;">Очистити</button>
        </div>

        <div class="output-wp">
            <h2>Результат</h2>
            <pre id="output">Очікування файлу...</pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
